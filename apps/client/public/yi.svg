<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- ponytail: 占位 logo, 用户给图后替换此文件即可 -->
  <defs>
    <style>
      .grid-major { stroke: #c8302a; stroke-width: 1.4; fill: none; opacity: 0.85; }
      .grid-minor { stroke: #d86a64; stroke-width: 0.5; fill: none; opacity: 0.5; }
      .ring { stroke: #c8302a; stroke-width: 1.2; fill: none; opacity: 0.7; }
      .corner { stroke: #c8302a; stroke-width: 1.2; fill: none; opacity: 0.7; }
      .yizi {
        font-family: "STKaiti", "KaiTi", "楷体", "Noto Serif CJK SC", serif;
        font-size: 130px;
        font-weight: 900;
        fill: #1a1208;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>
  </defs>

  <!-- 田字格主框 -->
  <rect x="10" y="10" width="180" height="180" class="grid-major" />
  <line x1="100" y1="10" x2="100" y2="190" class="grid-major" />
  <line x1="10" y1="100" x2="190" y2="100" class="grid-major" />

  <!-- 对角线 -->
  <line x1="10" y1="10" x2="190" y2="190" class="grid-minor" />
  <line x1="190" y1="10" x2="10" y2="190" class="grid-minor" />

  <!-- 角落定位线 -->
  <path d="M10 30 L30 30 L30 10" class="corner" />
  <path d="M190 30 L170 30 L170 10" class="corner" />
  <path d="M10 170 L30 170 L30 190" class="corner" />
  <path d="M190 170 L170 170 L170 190" class="corner" />

  <!-- 米字格细分小格 -->
  <g class="grid-minor">
    <line x1="55" y1="10" x2="55" y2="190" />
    <line x1="145" y1="10" x2="145" y2="190" />
    <line x1="10" y1="55" x2="190" y2="55" />
    <line x1="10" y1="145" x2="190" y2="145" />
  </g>

  <!-- 圆圈标记 -->
  <circle cx="40" cy="160" r="9" class="ring" />
  <circle cx="160" cy="40" r="9" class="ring" />

  <!-- 弈字 -->
  <text x="100" y="108" class="yizi">弈</text>
</svg>
