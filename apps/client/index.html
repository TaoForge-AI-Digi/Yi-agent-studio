<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>弈</title>
    <style>
      html, body, #app { min-height: 100%; }
      body { margin: 0; background: #2a2018; color: #e8d8b8; }
      html.dark body { background: #1a1208; }
      .boot-fallback {
        min-height: 100vh; display: grid; place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
    <script>
      (function() {
        try {
          const brightness = localStorage.getItem('yi_brightness') || 'dark';
          if (brightness === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <div class="boot-fallback">弈</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
